<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora sueldo neto</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --azul-ghenova: #002C5F;
            --azul-claro: #004A99;
            --azul-galicia: #63B8FF;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--azul-ghenova) 0%, var(--azul-claro) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .header { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        select { 
            background: rgba(255,255,255,0.2); color: white; border: none; 
            padding: 8px; border-radius: 8px; font-size: 14px;
        }
        h1 { font-size: 24px; margin-bottom: 5px; text-align: center; }
        .card {
            background: white; border-radius: 15px; padding: 15px;
            width: 100%; max-width: 400px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: var(--azul-ghenova); box-sizing: border-box;
        }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--azul-ghenova); }
        .wheel-input {
            width: 100%; font-size: 24px; font-weight: bold; text-align: center;
            border: none; color: var(--azul-ghenova); outline: none; background: transparent;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .input-field {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 16px; margin-bottom: 10px; box-sizing: border-box;
        }
        .results {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 25px;
            width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
        }
        #neto { font-size: 36px; font-weight: bold; color: var(--azul-ghenova); display: block; }
        #irpf { font-size: 14px; color: #666; margin: 10px 0; display: block; }
        #disponible { font-size: 18px; font-weight: bold; color: var(--azul-claro); display: block; border-top: 1px solid #ddd; pt: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <select id="lang" onchange="translateApp()">
            <option value="es">Español</option>
            <option value="gl">Galego</option>
        </select>
    </div>

    <h1 id="lblTitle">Calculadora sueldo neto</h1>

    <div class="card">
        <label id="lblBruto">SUELDO BRUTO ANUAL</label>
        <input type="number" id="bruto" class="wheel-input" value="25000" step="500" oninput="calculate()">
    </div>

    <div class="grid">
        <div class="card">
            <label id="lblComunidad">Comunidad</label>
            <select id="comunidad" class="input-field" onchange="calculate()">
                <option value="galicia">Galicia</option>
                <option value="madrid">Madrid</option>
            </select>
        </div>
        <div class="card">
            <label id="lblPagas">Pagas</label>
            <select id="pagas" class="input-field" onchange="calculate()">
                <option value="12">12</option>
                <option value="14">14</option>
            </select>
        </div>
    </div>

    <div class="card">
        <label id="lblGastos">GASTOS MENSUALES</label>
        <input type="number" id="alquiler" class="input-field" placeholder="Alquiler (€)" oninput="calculate()">
        <input type="number" id="transporte" class="input-field" placeholder="Transporte (€)" oninput="calculate()">
    </div>

    <div class="results">
        <span id="neto">0.00 € / mes</span>
        <span id="irpf">Retención IRPF: 0%</span>
        <span id="disponible">Disponible: 0.00 €</span>
    </div>

    <script>
        function translateApp() {
            const lang = document.getElementById('lang').value;
            const isGl = lang === 'gl';
            
            document.getElementById('lblTitle').innerText = isGl ? "Calculadora soldo neto" : "Calculadora sueldo neto";
            document.getElementById('lblBruto').innerText = isGl ? "SOLDO BRUTO ANUAL" : "SUELDO BRUTO ANUAL";
            document.getElementById('lblComunidad').innerText = isGl ? "Comunidade" : "Comunidad";
            document.getElementById('lblPagas').innerText = isGl ? "Pagas" : "Pagas";
            document.getElementById('lblGastos').innerText = isGl ? "GASTOS MENSUAIS" : "GASTOS MENSUALES";
            document.getElementById('alquiler').placeholder = isGl ? "Aluguer / Hipoteca (€)" : "Alquiler / Hipoteca (€)";
            document.getElementById('transporte').placeholder = isGl ? "Transporte / AP-9 (€)" : "Transporte / AP-9 (€)";
            
            calculate();
        }

        function calculate() {
            const bruto = parseFloat(document.getElementById('bruto').value) || 0;
            const numPagas = parseInt(document.getElementById('pagas').value);
            const alquiler = parseFloat(document.getElementById('alquiler').value) || 0;
            const transporte = parseFloat(document.getElementById('transporte').value) || 0;
            const isGl = document.getElementById('lang').value === 'gl';

            // Lógica fiscal simplificada (igual que en C#)
            const ss = bruto * 0.0645;
            const minimos = 5550 + 1200 + 1500;
            const baseLiq = Math.max(0, bruto - ss - 2000 - minimos);

            let cuota = 0;
            if (baseLiq <= 12450) cuota = baseLiq * 0.19;
            else if (baseLiq <= 20200) cuota = 2365 + (baseLiq - 12450) * 0.24;
            else if (baseLiq <= 35200) cuota = 4225 + (baseLiq - 20200) * 0.30;
            else cuota = 8725 + (baseLiq - 35200) * 0.37;

            const retPorcentaje = (cuota / bruto) * 100 || 0;
            const netoAnual = bruto - ss - cuota;
            const netoMensual = netoAnual / numPagas;
            const disponible = netoMensual - alquiler - transporte;

            document.getElementById('neto').innerText = netoMensual.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " € / mes";
            document.getElementById('irpf').innerText = (isGl ? "Retención IRPF: " : "Retención IRPF: ") + retPorcentaje.toFixed(2) + "%";
            document.getElementById('disponible').innerText = (isGl ? "Dispoñible: " : "Disponible: ") + disponible.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
        }

        // Ejecutar al cargar
        calculate();
    </script>
</body>
</html>
