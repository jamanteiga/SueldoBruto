<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora sueldo neto</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --azul-ghenova: #002C5F; --azul-claro: #004A99; }
        body {
            margin: 0; font-family: -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, var(--azul-ghenova) 0%, var(--azul-claro) 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .header { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        #lang { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px; border-radius: 8px; }
        h1 { font-size: 22px; margin-bottom: 20px; text-align: center; }
        
        .card {
            background: white; border-radius: 15px; padding: 15px; width: 100%; max-width: 400px; 
            margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); color: var(--azul-ghenova); box-sizing: border-box;
        }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        
        /* Selector de Sueldo Estilo Rodillo */
        .salary-stepper { display: flex; align-items: center; justify-content: space-between; background: #f0f4f8; border-radius: 10px; padding: 5px; }
        .stepper-btn { background: var(--azul-ghenova); color: white; border: none; width: 45px; height: 45px; border-radius: 8px; font-size: 24px; font-weight: bold; }
        .wheel-input {
            width: 60%; font-size: 24px; font-weight: bold; text-align: center;
            border: none; color: var(--azul-ghenova); background: transparent; outline: none;
        }

        /* Selectores corregidos para iPhone */
        .input-field {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 16px; box-sizing: border-box; color: var(--azul-ghenova) !important; 
            background-color: #f9f9f9 !important; appearance: none; -webkit-appearance: none;
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 12px; }
        
        .results {
            background: rgba(255,255,255,0.95); border-radius: 20px; padding: 20px;
            width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
        }
        #neto { font-size: 32px; font-weight: bold; color: var(--azul-ghenova); display: block; }
        #disponible { font-size: 18px; font-weight: bold; color: #27ae60; display: block; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <select id="lang" onchange="translateApp()">
            <option value="es">Español</option>
            <option value="gl">Galego</option>
        </select>
    </div>

    <h1 id="lblTitle">Calculadora sueldo neto</h1>

    <div class="card">
        <label id="lblBruto">Sueldo Bruto Anual</label>
        <div class="salary-stepper">
            <button class="stepper-btn" onclick="changeSalary(-1000)">-</button>
            <input type="number" id="bruto" class="wheel-input" value="30000" oninput="calculate()">
            <button class="stepper-btn" onclick="changeSalary(1000)">+</button>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="margin-bottom:0">
            <label id="lblComunidad">Comunidad</label>
            <select id="comunidad" class="input-field" onchange="calculate()">
                <option value="galicia" selected>Galicia</option>
                <option value="madrid">Madrid</option>
                <option value="andalucia">Andalucía</option>
                <option value="cataluna">Cataluña</option>
                <option value="valencia">C. Valenciana</option>
                <option value="comun">Otras CCAA</option>
            </select>
        </div>
        <div class="card" style="margin-bottom:0">
            <label id="lblPagas">Pagas</label>
            <select id="pagas" class="input-field" onchange="calculate()">
                <option value="12" selected>12 Pagas</option>
                <option value="14">14 Pagas</option>
            </select>
        </div>
    </div>

    <div class="card">
        <label id="lblGastos">Gastos Mensuales</label>
        <div style="display: flex; gap: 8px;">
            <input type="number" id="alquiler" class="input-field" placeholder="Vivienda (€)" oninput="calculate()">
            <input type="number" id="transporte" class="input-field" placeholder="Transporte (€)" oninput="calculate()">
        </div>
    </div>

    <div class="results">
        <span id="neto">0.00 € / mes</span>
        <span id="irpf" style="color:#666; font-size:14px;">Retención IRPF: 0%</span>
        <span id="disponible">Disponible real: 0.00 €</span>
    </div>

    <script>
        function changeSalary(amount) {
            const input = document.getElementById('bruto');
            input.value = parseInt(input.value) + amount;
            calculate();
        }

        function translateApp() {
            const lang = document.getElementById('lang').value;
            const isGl = lang === 'gl';
            document.getElementById('lblTitle').innerText = isGl ? "Calculadora soldo neto" : "Calculadora sueldo neto";
            document.getElementById('lblBruto').innerText = isGl ? "SOLDO BRUTO ANUAL" : "SUELDO BRUTO ANUAL";
            document.getElementById('lblComunidad').innerText = isGl ? "Comunidade" : "Comunidad";
            document.getElementById('lblPagas').innerText = isGl ? "Pagas" : "Pagas";
            document.getElementById('lblGastos').innerText = isGl ? "GASTOS MENSUAIS" : "GASTOS MENSUALES";
            document.getElementById('alquiler').placeholder = isGl ? "Vivenda (€)" : "Vivienda (€)";
            document.getElementById('transporte').placeholder = isGl ? "Transporte (€)" : "Transporte (€)";
            calculate();
        }

        function calculate() {
            const bruto = parseFloat(document.getElementById('bruto').value) || 0;
            const numPagas = parseInt(document.getElementById('pagas').value);
            const alquiler = parseFloat(document.getElementById('alquiler').value) || 0;
            const transporte = parseFloat(document.getElementById('transporte').value) || 0;
            const comunidad = document.getElementById('comunidad').value;
            const isGl = document.getElementById('lang').value === 'gl';

            const ss = bruto * 0.0645;
            let tipo = (comunidad === 'madrid' || comunidad === 'galicia') ? 0.18 : 0.19;
            let baseLiq = Math.max(0, bruto - ss - 2000 - 5550);
            
            let cuota = baseLiq * (tipo + (bruto > 35000 ? 0.05 : 0));
            const netoAnual = bruto - ss - cuota;
            const netoMensual = netoAnual / numPagas;
            const retPorcentaje = (cuota / bruto) * 100 || 0;

            document.getElementById('neto').innerText = netoMensual.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " € / mes";
            document.getElementById('irpf').innerText = "Retención IRPF est.: " + retPorcentaje.toFixed(2) + "%";
            document.getElementById('disponible').innerText = (isGl ? "Dispoñible: " : "Disponible real: ") + (netoMensual - alquiler - transporte).toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
        }
        calculate();
    </script>
</body>
</html>
